<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SiteTalk</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">SiteTalk</span>
      </div>
      <button id="settingsToggle" class="icon-btn" title="Advanced settings">⚙</button>
    </header>

    <section class="status-card">
      <div class="status-row">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Checking this tab…</span>
      </div>
      <div id="roomLabel" class="room-label"></div>
      <button id="openPanelBtn" class="btn primary full">Open chat on this page</button>
    </section>

    <section class="identity-card">
      <div class="tabs">
        <button class="tab active" data-tab="anon">Anonymous</button>
        <button class="tab" data-tab="account">Account</button>
      </div>

      <div id="tab-anon" class="tab-panel active">
        <p class="hint">You're chatting as a random guest name on every site. No sign-up needed — great for quick, throwaway conversations.</p>
        <label class="field-label">Guest name on this device</label>
        <div class="inline-field">
          <input id="guestNameInput" type="text" maxlength="24" placeholder="Loading…" />
          <button id="saveGuestName" class="btn small">Save</button>
        </div>
      </div>

      <div id="tab-account" class="tab-panel">
        <div id="loggedOutView">
          <p class="hint">Sign in to keep the same name and message history across every site and device.</p>
          <input id="emailInput" type="email" placeholder="Email" class="field" />
          <input id="passwordInput" type="password" placeholder="Password" class="field" />
          <div class="button-row">
            <button id="loginBtn" class="btn primary">Sign in</button>
            <button id="signupBtn" class="btn ghost">Create account</button>
          </div>
          <p id="authError" class="auth-error" hidden></p>
        </div>
        <div id="loggedInView" hidden>
          <p class="hint">Signed in as <strong id="accountEmail"></strong>.</p>
          <label class="field-label">Display name</label>
          <div class="inline-field">
            <input id="displayNameInput" type="text" maxlength="24" />
            <button id="saveDisplayName" class="btn small">Save</button>
          </div>
          <button id="logoutBtn" class="btn ghost full">Sign out</button>
        </div>
      </div>
    </section>

    <section id="advancedCard" class="advanced-card" hidden>
      <label class="field-label">Server address</label>
      <input id="serverUrlInput" type="text" class="field" placeholder="wss://your-server.example.com" />
      <button id="saveServerUrl" class="btn small full">Save server address</button>
    </section>

    <footer class="app-footer">
      <a href="https://github.com/yashahuja31/SiteTalk" target="_blank" rel="noopener">GitHub</a>
      <span class="dot-sep">·</span>
      <a href="https://sitetalk.app" target="_blank" rel="noopener">sitetalk.app</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
